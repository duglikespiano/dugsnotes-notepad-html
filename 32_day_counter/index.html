<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link href="style.css" rel="stylesheet" />
		<script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
		<script src="app.js" defer></script>
	</head>
	<body>
		<div style="display: flex">
			<div class="years"><span data-time="years">00</span><span class="years__text">년</span></div>
			<div class="months"><span data-time="months">00</span><span class="months__text">개월</span></div>
			<div class="days"><span data-time="days">00</span><span class="days__text">일</span></div>
			<div class="hours"><span data-time="hours">00</span><span class="hours__text">시간</span></div>
			<div class="minutes"><span data-time="minutes">00</span><span class="minutes__text">분</span></div>
			<div class="seconds"><span data-time="seconds">00</span><span class="seconds__text">초</span></div>
			<p class="is-past" style="margin: 0"></p>
		</div>
	</body>
</html>
